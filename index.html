<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>排序演示 — 全粉紅主題</title>
    <style>
        :root {
            /* 調整為更和諧、無分裂感的全粉紅色階 */
            --bg: #fff0f5;         /* 極淺的櫻花粉底色 */
            --panel: rgba(255, 214, 232, 0.6); /* 面板半透粉色 */
            --muted: #a84b7d;      /* 柔和的深粉字體 (副標題) */
            --accent: #ff85b3;     /* 亮粉色 (Hover漸層上) */
            --accent-2: #ff529a;   /* 較深的亮粉色 (Hover漸層下) */
            --text-main: #8a1c4a;  /* 主字體深玫瑰粉 (取代原本偏暗紫色的字) */
        }
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #ffc4db 100%);
            color: var(--text-main);
            padding: 28px;
            min-height: 100vh; /* 確保漸層填滿整個畫面 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .wrap { 
            width: 100%;
            max-width: 600px; /* 首頁選單不需要太寬 */
            margin: 40px auto 0; 
        }
        
        h1 { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 10px; 
            font-weight: 600; 
            margin-bottom: 5px;
        }
        
        .meta { 
            color: var(--muted); 
            margin-top: 6px; 
            text-align: center;
            font-size: 15px;
        }

        /* 首頁專屬面板設計：毛玻璃質感 */
        .panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 40px 20px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(255, 136, 182, 0.15);
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        /* 首頁選單按鈕的專屬樣式 */
        .menu-link {
            background: linear-gradient(180deg, #ffffff, #ffe8f2);
            color: var(--text-main);
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            text-align: center;
            border: 1px solid #ffb6d5;
            box-shadow: 0 4px 15px rgba(255, 163, 198, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 滑鼠移上去的動畫與顏色 */
        .menu-link:hover {
            transform: translateY(-3px) scale(1.02);
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            color: #ffffff;
            border-color: var(--accent-2);
            box-shadow: 0 8px 25px rgba(255, 82, 154, 0.4);
        }
        
        /* 點擊時的回饋 */
        .menu-link:active {
            transform: translateY(1px);
            filter: brightness(0.95);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>🌸 排序演算法演示</h1>
        <div class="meta">請選擇要查看的排序演算法</div>

        <div class="panel">
            <a href="bubble_sort.html" class="menu-link">⚪ 氣泡排序 Bubble Sort</a>
            <a href="selection_sort.html" class="menu-link">🔷 選擇排序 Selection Sort</a>
            <a href="insertion_sort.html" class="menu-link">↪️ 插入排序 Insertion Sort</a>
            <a href="merge_sort.html" class="menu-link">🔀 合併排序 Merge Sort</a>
            <a href="quick_sort.html" class="menu-link">⚡ 快速排序 Quick Sort</a>
        </div>
    </div>
</body>
</html>
