<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>氣泡排序 Bubble Sort — 視覺化步驟示範</title>
    <style>
        :root{
            --bg:#ffe9f4;--panel:#ffd6e8;--muted:#7e3b5d;--accent:#ff9bcf;--accent-2:#f66fa5;
            --ok:#df75a8;--danger:#dd426e;--card:#ffe1eb
        }
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter,Segoe UI,Arial;background:linear-gradient(180deg,var(--bg),#ffd6e8);color:#4d1531;padding:28px}
        .wrap{max-width:980px;margin:0 auto}
        h1{display:flex;align-items:center;gap:10px;font-weight:600}
        .meta{color:var(--muted);margin-top:6px}

        .panel{background:var(--panel);border-radius:12px;padding:18px;margin-top:16px;box-shadow:0 6px 18px rgba(255,155,195,0.45)}
        .desc{background:rgba(255,255,255,.45);padding:12px;border-radius:8px;color:#7e3b5d}

        .stats{display:flex;gap:10px;margin:12px 0;align-items:center}
        .stat{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.55);font-size:13px;color:#4d1531}
        .controls{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
        input[type=text]{padding:8px;border-radius:8px;border:none;background:rgba(255,255,255,.6);color:#4d1531;min-width:260px}
        button{background:linear-gradient(180deg,var(--accent),#ff7fab);border:none;color:#3c0f24;padding:10px 14px;border-radius:999px;cursor:pointer}
        button.ghost{background:rgba(255,255,255,.35);color:#7e3b5d;border:1px solid rgba(255,255,255,.65)}
        button.warn{background:linear-gradient(180deg,var(--accent-2),#ee5d8f);color:#3c0f24}
        .small{padding:8px 10px;font-size:13px}
        #visualWrap{height:320px;margin-top:14px;display:flex;align-items:center;justify-content:center}
        #visual{width:100%;height:100%;display:flex;align-items:flex-end;gap:10px;padding:18px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.35),transparent)}
        .bar{flex:1;display:flex;align-items:flex-end;justify-content:center;background:linear-gradient(180deg,#ffb3cf,#ff8cae);color:#4d1531;border-radius:6px 6px 4px 4px;padding:6px 4px;font-weight:600}
        .bar.compare{background:linear-gradient(180deg,#ffc7df,#ff93bd)}
        .bar.swap{background:linear-gradient(180deg,#ff8aa9,#ff5f8f)}
        .bar.sorted{background:linear-gradient(180deg,#ffd4e5,#ffb0ca)}
        .legend{display:flex;gap:12px;align-items:center;margin-top:10px;color:#7e3b5d}
        .legend .item{display:flex;gap:8px;align-items:center}
        .dot{width:14px;height:14px;border-radius:4px}
        .dot.un{background:#ff9bcf}
        .dot.cmp{background:#ff8aa9}
        .dot.swap{background:#ff5f8f}
        .dot.done{background:#df75a8}

        .footerControls{display:flex;gap:8px;align-items:center;margin-top:14px}
        .status{margin-left:auto;color:#7e3b5d}
        .controls input[type=range]{width:160px}

        .badge{background:rgba(255,255,255,.45);padding:6px 10px;border-radius:999px;color:#7e3b5d;font-size:13px}
    </style>
</head>
<body>
    <div class="wrap">
        <h1>⚪ 氣泡排序法</h1>
        <div style="margin-top:8px">
            <a href="index.html" class="badge">回首頁</a>
            <a href="selection_sort.html" class="badge" style="margin-left:8px">選擇排序 Selection Sort</a>
        </div>

        <div class="meta">Bubble Sort — 視覺化步驟示範</div>

        <div class="panel">
            <div class="desc">
                原理：氣泡排序會重複地比較相鄰兩個元素，若左邊比右邊大，就交換它們的位置。每一輪（Pass）結束後，當輪中最大的元素就像氣泡一樣浮到最右端，並被標記為已排序。重複進行 n-1 輪後，所有元素即排序完成。
            </div>

            <div class="stats">
                <div class="stat">第 <span id="pass">0</span> 輪 / 共 <span id="totalPass">0</span> 輪</div>
                <div class="stat">比較次數：<span id="comp">0</span></div>
                <div class="stat">交換次數：<span id="swaps">0</span></div>
                <div class="stat">狀態：<span id="status">暫停</span></div>
            </div>

            <div class="controls">
                <input id="input" type="text" placeholder="輸入數字，逗號分隔 e.g. 64,34,25,12,22,11,90" />
                <button id="rand" class="ghost small">亂數陣列</button>
                <select id="order" class="small">
                    <option value="asc">遞增</option>
                    <option value="desc">遞減</option>
                </select>
                <label class="small">速度 <input id="speed" type="range" min="20" max="800" value="220" /></label>
                <div style="display:flex;gap:6px;align-items:center">
                    <button id="start" class="small">開始</button>
                    <button id="pause" class="small ghost">暫停</button>
                    <button id="step" class="small ghost">單步</button>
                    <button id="reset" class="small ghost">重置</button>
                </div>
            </div>

            <div id="visualWrap">
                <div id="visual" aria-label="visualization"></div>
            </div>

            <div class="legend">
                <div class="item"><span class="dot un"></span> 未排序</div>
                <div class="item"><span class="dot cmp"></span> 比較中</div>
                <div class="item"><span class="dot swap"></span> 交換中</div>
                <div class="item"><span class="dot done"></span> 已排序</div>
            </div>
        </div>
    </div>

    <script>
        const inputEl = document.getElementById('input');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const stepBtn = document.getElementById('step');
        const resetBtn = document.getElementById('reset');
        const randBtn = document.getElementById('rand');
        const visual = document.getElementById('visual');
        const passEl = document.getElementById('pass');
        const totalPassEl = document.getElementById('totalPass');
        const compEl = document.getElementById('comp');
        const swapsEl = document.getElementById('swaps');
        const statusEl = document.getElementById('status');
        const speedEl = document.getElementById('speed');
        const orderEl = document.getElementById('order');

        let array = [];
        let working = false;
        let paused = true;
        let stepRequested = false;
        let stats = {pass:0, comps:0, swaps:0};

        function randArray(n=7, max=100){
            return Array.from({length:n}, ()=>Math.floor(Math.random()*max)+1);
        }

        function parseInput(text){
            if(!text) return [];
            return text.split(',').map(s=>Number(s.trim())).filter(n=>!Number.isNaN(n));
        }

        function render(){
            visual.innerHTML='';
            if(array.length===0) return;
            const max = Math.max(...array.map(v=>Math.abs(v)),1);
            for(let i=0;i<array.length;i++){
                const val = array[i];
                const el = document.createElement('div');
                el.className='bar';
                el.style.height = (Math.abs(val)/max*100) + '%';
                el.style.margin = '0 6px';
                el.textContent = val;
                el.dataset.index = i;
                visual.appendChild(el);
            }
        }

        function setStatus(s){ statusEl.textContent = s; }
        function updateStats(){ passEl.textContent = stats.pass; totalPassEl.textContent = Math.max(0,array.length-1); compEl.textContent = stats.comps; swapsEl.textContent = stats.swaps; }

        function colorPair(i, j, mode){
            const bars = visual.children;
            for(let k=0;k<bars.length;k++) bars[k].classList.remove('compare','swap','sorted');
            if(mode==='compare'){
                bars[i]?.classList.add('compare');
                bars[j]?.classList.add('compare');
            }else if(mode==='swap'){
                bars[i]?.classList.add('swap');
                bars[j]?.classList.add('swap');
            }else if(mode==='sorted'){
                for(let s=bars.length-1;s>=bars.length-stats.pass;s--){ if(bars[s]) bars[s].classList.add('sorted'); }
            }
        }

        function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

        async function doPause(){
            while(paused && !stepRequested){ await sleep(50); }
            if(stepRequested){ stepRequested=false; paused=true; }
        }

        async function bubbleSortControlled(){
            working = true; paused = false; setStatus('執行中');
            stats = {pass:0, comps:0, swaps:0}; updateStats();
            const asc = orderEl.value==='asc';
            const n = array.length;
            for(let i=0;i<n-1;i++){
                stats.pass = i+1; updateStats();
                let swapped = false;
                for(let j=0;j<n-1-i;j++){
                    if(paused) await doPause();
                    stats.comps++; updateStats();
                    colorPair(j,j+1,'compare');
                    await sleep(Number(speedEl.value));
                    if(asc ? array[j] > array[j+1] : array[j] < array[j+1]){
                        colorPair(j,j+1,'swap');
                        await sleep(Number(speedEl.value)/2);
                        const t = array[j]; array[j]=array[j+1]; array[j+1]=t;
                        stats.swaps++; swapped=true; updateStats();
                        render();
                        colorPair(j,j+1,'swap');
                        await sleep(Number(speedEl.value)/2);
                    }
                    render();
                }
                colorPair();
                render();
                if(!swapped) break;
            }
            const bars = visual.children;
            for(let k=0;k<bars.length;k++) bars[k].classList.add('sorted');
            setStatus('完成'); working=false; paused=true; updateStats();
        }

        startBtn.addEventListener('click', async ()=>{
            if(working){ paused=false; setStatus('執行中'); return; }
            const parsed = parseInput(inputEl.value);
            if(parsed.length>0) array = parsed.slice();
            if(array.length===0){ array = randArray(7,100); inputEl.value = array.join(','); }
            render();
            bubbleSortControlled();
        });

        pauseBtn.addEventListener('click', ()=>{ if(!working) return; paused=true; setStatus('暫停'); });

        stepBtn.addEventListener('click', ()=>{ if(!working){ startBtn.click(); paused=true; } stepRequested=true; paused=false; setStatus('單步'); });

        resetBtn.addEventListener('click', ()=>{ working=false; paused=true; stepRequested=false; array=[]; inputEl.value=''; visual.innerHTML=''; stats={pass:0,comps:0,swaps:0}; updateStats(); setStatus('暫停'); });

        randBtn.addEventListener('click', ()=>{ const a = randArray(7,100); array=a; inputEl.value=a.join(','); render(); stats={pass:0,comps:0,swaps:0}; updateStats(); setStatus('暫停'); });

        // initial demo
        array = [64,34,25,12,22,11,90]; inputEl.value = array.join(','); render(); updateStats(); setStatus('暫停');
    </script>
</body>
</html>
